<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACI1878 | Doğrulama</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d1b3e; --navy2: #162347; --gold: #c9a84c; --gold2: #e8c76a;
      --light: #f0f4ff; --muted: #8a9bbf; --border: #1e3060; --red: #c0392b;
    }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--navy);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--navy2);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; justify-content: center; margin-bottom: 1.75rem; }
    .logo-badge { background: var(--gold); color: var(--navy); font-weight: 800; font-size: 1rem; padding: 0.4rem 0.75rem; border-radius: 6px; }
    .logo-text { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .logo-text span { color: var(--gold); }
    h2 { text-align: center; font-size: 1rem; color: var(--muted); font-weight: 500; margin-bottom: 0.4rem; }
    .email-hint { text-align: center; font-size: 0.85rem; color: var(--gold2); font-weight: 600; margin-bottom: 1.5rem; word-break: break-all; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; letter-spacing: 0.03em; }
    input {
      width: 100%; padding: 0.7rem 0.9rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--navy); color: var(--light); font-size: 1.3rem; text-align: center;
      letter-spacing: 0.5em; font-family: inherit; outline: none;
    }
    input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
    .btn {
      width: 100%; padding: 0.75rem; border-radius: 8px; border: none; cursor: pointer;
      font-size: 0.95rem; font-weight: 700; font-family: inherit; margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy);
    }
    .btn:hover { opacity: 0.88; }
    .alert-error {
      background: rgba(192,57,43,0.2); border: 1px solid var(--red); color: #f1948a;
      padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; text-align: center;
    }
    .footer-note { text-align: center; color: var(--muted); font-size: 0.75rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-badge">ACI</div>
      <div class="logo-text">Link<span>Kısalt</span></div>
    </div>

    <h2>E-postanıza gönderilen 6 haneli kodu girin</h2>
    <div class="email-hint">{{ email }}</div>

    {% if error %}
    <div class="alert-error">
      Kod hatalı.{% if attempts_left %} Kalan deneme hakkı: {{ attempts_left }}{% endif %}
    </div>
    {% endif %}

    <form method="post" action="/login/verify-code">
      <input type="hidden" name="email" value="{{ email }}" />
      <div class="form-group">
        <label>Doğrulama Kodu</label>
        <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="——————" required autofocus autocomplete="one-time-code" />
      </div>
      <button type="submit" class="btn">Doğrula ve Giriş Yap</button>
    </form>

    <div class="footer-note">
      Kod gelmediyse birkaç dakika bekleyip tekrar giriş yapmayı deneyin.
    </div>
  </div>
</body>
</html>
